version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.host-env
    container_name: hospital-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-医院数据管理系统}
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-hospital-system-secret-key-2024}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - MYSQL_HOST=${MYSQL_HOST:-192.168.100.76}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-jxks}
    volumes:
      # 挂载宿主机的 miniconda 虚拟环境
      - /home/aaa/miniconda3/envs/meta:/opt/conda/envs/meta
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge
